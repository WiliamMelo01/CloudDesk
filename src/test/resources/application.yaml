spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:clouddesk_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false

clouddesk:
  storage:
    s3:
      bucket: clouddesk-company-assets-test
      region: us-east-1
      endpoint:
      access-key: test
      secret-key: test
      public-base-url: http://localhost:4566
      path-style-access-enabled: true
