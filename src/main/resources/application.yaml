spring:
  application:
    name: CloudDesk
  docker:
    compose:
      enabled: true
      file: compose.yaml
      lifecycle-management: start-and-stop
      readiness:
        wait: always
  datasource:
    url: jdbc:postgresql://localhost:5432/clouddesk
    username: clouddesk
    password: clouddesk
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379

clouddesk:
  security:
    jwt:
      secret: change-this-development-secret
      access-expiration-seconds: 900
      refresh-expiration-seconds: 604800
  storage:
    s3:
      bucket: clouddesk-company-assets
      region: us-east-1
      endpoint: http://localhost:4566
      access-key: test
      secret-key: test
      public-base-url: http://localhost:4566
      path-style-access-enabled: true
