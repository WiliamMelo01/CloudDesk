spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: ${CLOUDDESK_DB_URL}
    username: ${CLOUDDESK_DB_USERNAME}
    password: ${CLOUDDESK_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
      host: ${CLOUDDESK_REDIS_HOST}
      port: ${CLOUDDESK_REDIS_PORT:6379}
      password: ${CLOUDDESK_REDIS_PASSWORD:}

clouddesk:
  security:
    jwt:
      secret: ${CLOUDDESK_JWT_SECRET}
      access-expiration-seconds: ${CLOUDDESK_JWT_ACCESS_EXPIRATION_SECONDS:900}
      refresh-expiration-seconds: ${CLOUDDESK_JWT_REFRESH_EXPIRATION_SECONDS:604800}
  storage:
    s3:
      bucket: ${CLOUDDESK_S3_BUCKET}
      region: ${CLOUDDESK_S3_REGION:us-east-1}
      endpoint: ${CLOUDDESK_S3_ENDPOINT:}
      access-key: ${CLOUDDESK_S3_ACCESS_KEY}
      secret-key: ${CLOUDDESK_S3_SECRET_KEY}
      public-base-url: ${CLOUDDESK_S3_PUBLIC_BASE_URL}
      path-style-access-enabled: ${CLOUDDESK_S3_PATH_STYLE_ACCESS_ENABLED:false}
