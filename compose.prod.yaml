services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clouddesk-api:prod
    container_name: clouddesk-api-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CLOUDDESK_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-clouddesk}
      CLOUDDESK_DB_USERNAME: ${POSTGRES_USER:-clouddesk}
      CLOUDDESK_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLOUDDESK_REDIS_HOST: redis
      CLOUDDESK_REDIS_PORT: 6379
      CLOUDDESK_REDIS_PASSWORD: ${REDIS_PASSWORD}
      CLOUDDESK_JWT_SECRET: ${CLOUDDESK_JWT_SECRET}
      CLOUDDESK_JWT_ACCESS_EXPIRATION_SECONDS: ${CLOUDDESK_JWT_ACCESS_EXPIRATION_SECONDS:-900}
      CLOUDDESK_JWT_REFRESH_EXPIRATION_SECONDS: ${CLOUDDESK_JWT_REFRESH_EXPIRATION_SECONDS:-604800}
      CLOUDDESK_S3_BUCKET: ${CLOUDDESK_S3_BUCKET}
      CLOUDDESK_S3_REGION: ${CLOUDDESK_S3_REGION:-us-east-1}
      CLOUDDESK_S3_ENDPOINT: ${CLOUDDESK_S3_ENDPOINT:-}
      CLOUDDESK_S3_ACCESS_KEY: ${CLOUDDESK_S3_ACCESS_KEY}
      CLOUDDESK_S3_SECRET_KEY: ${CLOUDDESK_S3_SECRET_KEY}
      CLOUDDESK_S3_PUBLIC_BASE_URL: ${CLOUDDESK_S3_PUBLIC_BASE_URL}
      CLOUDDESK_S3_PATH_STYLE_ACCESS_ENABLED: ${CLOUDDESK_S3_PATH_STYLE_ACCESS_ENABLED:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: clouddesk-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clouddesk}
      POSTGRES_USER: ${POSTGRES_USER:-clouddesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clouddesk} -d ${POSTGRES_DB:-clouddesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: clouddesk-redis-prod
    command: /bin/sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
